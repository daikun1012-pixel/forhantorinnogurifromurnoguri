name = "couple-date-wishlist"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# D1 binding. The database is already created and bound to the Pages
# project as `DB`; runtime access is via `env.DB` in Pages Functions.
# For local `wrangler` migration commands, set database_id below.
[[d1_databases]]
binding = "DB"
database_name = "couple-date-wishlist"
database_id = "c3b36880-b9ee-4316-aeab-43bda6683aa2"
migrations_dir = "migrations"

# R2 bucket for visit photos, bound as `PHOTOS`.
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "couple-date-photos"
